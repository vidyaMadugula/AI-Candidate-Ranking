ai_usage_summary: |
Used ChatGPT for architectural discussion, debugging assistance, code review, and implementation guidance. No candidate data was sent to external APIs during ranking. Final implementation, integration, testing, and validation were performed by the participant.

methodology_summary: |
Hybrid AI-based candidate ranking system combining semantic retrieval (Sentence Transformers + FAISS) and lexical retrieval (BM25). Candidate relevance is computed using semantic similarity, skill alignment, experience matching, behavioral signals, profile quality, and mandatory skill constraints. A honeypot detection module penalizes suspicious or inconsistent profiles, while diversity reranking improves shortlist quality by reducing redundancy. An explainability module generates evidence-based reasoning for every ranked recommendation.


