# ============================================================================
# AI tools declaration
# ============================================================================

ai_tools_used:
  - "ChatGPT"

ai_usage_summary: |
  Used ChatGPT for architectural discussion, debugging assistance, code review,
  and implementation guidance. No candidate data was sent to external AI
  services during ranking. The final system design, implementation,
  integration, testing, validation, and submission were completed by the participant.

# ============================================================================
# Approach summary 
# ============================================================================

methodology_summary: |
  Hybrid AI-based candidate ranking system combining semantic retrieval
  (SentenceTransformer + FAISS) and lexical retrieval (BM25). Candidate
  relevance is computed using semantic similarity, skill verification,
  experience alignment, behavioral signals, career intelligence, profile
  quality assessment, and mandatory skill constraints. A honeypot detection
  module penalizes suspicious or inconsistent profiles, while diversity
  reranking reduces redundant recommendations. The pipeline automatically
  preprocesses candidates, generates embeddings, builds the FAISS index (if
  required), and produces an explainable ranked CSV containing evidence-based
  reasoning for each recommendation.

